# Nginx reverse proxy for omnipay.club
# TLS managed by Let's Encrypt / certbot

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=relay:10m rate=10r/s;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name omnipay.club;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name omnipay.club;

    # TLS certificates (certbot will manage these)
    ssl_certificate /etc/letsencrypt/live/omnipay.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omnipay.club/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API routes → zkira-api (port 3021)
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:3021;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health check → API
    location /health {
        proxy_pass http://127.0.0.1:3021;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Relayer routes → zkira-relayer (port 3022)
    location /relay/ {
        limit_req zone=relay burst=20 nodelay;
        proxy_pass http://127.0.0.1:3022/relay/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /session/ {
        limit_req zone=relay burst=20 nodelay;
        proxy_pass http://127.0.0.1:3022/session/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /tron/ {
        limit_req zone=relay burst=20 nodelay;
        proxy_pass http://127.0.0.1:3022/tron/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swap API → zkira-swap-api (port 3014)
    location /swap-api/ {
        proxy_pass http://127.0.0.1:3014/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Swap app (port 3015) — only if needed at a subpath
    location /swap/ {
        proxy_pass http://127.0.0.1:3015/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else → zkira-pay Next.js app (port 3020)
    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
